name: Audit
on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type-check
        run: npm run type-check
      - name: Backup audit (strict)
        run: node scripts/backup-audit.js --strict
      - name: Hardcoded entities check
        run: node scripts/check-hardcoded-entities.js
      - name: Knowledge audit (strict)
        run: node scripts/knowledge-audit.js --strict
      - name: Verify docs are up to date
        run: |
          node scripts/update-site.js
          git diff --exit-code docs/ README.md \
            || (echo "::error::Docs out of sync — run 'node scripts/update-site.js' locally and commit the result." && exit 1)
      - name: Lint
        run: npm run lint
